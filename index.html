<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Vision - Davi Marques</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; }
        #mira { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; border: 3px solid #0f0; border-radius: 10px; z-index: 50; box-shadow: 0 0 0 5000px rgba(0,0,0,0.8); pointer-events: none; }
        #barra { position: fixed; top: 0; left: 0; height: 6px; background: #0f0; width: 0%; z-index: 101; transition: width 0.1s; }
        .topo { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px; z-index: 100; border-bottom: 2px solid #0f0; }
        .botoes { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 110; }
        button { padding: 15px 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        #btn-reg { background: #fff; color: #000; }
        #btn-scan { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div id="barra"></div>
    <div class="topo">
        <div id="status">Buscando desenho...</div>
        <div id="stats" style="font-size:10px; color:#0f0">Padrão: 0%</div>
    </div>

    <div id="mira"></div>
    <video id="video" playsinline></video>
    <canvas id="p" style="display:none;"></canvas>

    <div class="botoes">
        <button id="btn-reg" onclick="salvarServidor()">CONFIGURAR MEU QR</button>
        <button id="btn-scan" onclick="escanear()">ESCANEAR</button>
    </div>

    <script>
        const video = document.querySelector('video');
        const canvas = document.querySelector('#p');
        const status = document.querySelector('#status');
        const stats = document.querySelector('#stats');
        const barra = document.querySelector('#barra');

        // Banco de dados compartilhado
        const dbURL = "https://keyvalue.xyz";

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => { video.srcObject = s; video.play(); });

        function gerarDNA() {
            canvas.width = 40; canvas.height = 40;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, video.videoWidth/2-110, video.videoHeight/2-110, 220, 220, 0, 0, 40, 40);
            const data = ctx.getImageData(0, 0, 40, 40).data;
            let dna = "";
            for (let i = 0; i < data.length; i += 4) {
                dna += (data[i] + data[i+1] + data[i+2]) / 3 < 100 ? "1" : "0";
            }
            return dna;
        }

        async function salvarServidor() {
            const dna = gerarDNA();
            let url = prompt("Qual site este desenho deve abrir?");
            if (url) {
                if (!url.startsWith("http")) url = "https://" + url;
                status.innerText = "Sincronizando...";
                await fetch(`${dbURL}/${dna}_SPLIT_${url}`, { method: 'POST' });
                alert("Configurado!");
                location.reload();
            }
        }

        async function escanear() {
            const dnaAtual = gerarDNA();
            try {
                const res = await fetch(dbURL);
                const data = await res.text();
                const parts = data.split("_SPLIT_");
                if(parts.length < 2) return alert("Configure um site primeiro.");
                
                const dnaSalvo = parts[0];
                const linkSalvo = parts[1];

                let acertos = 0;
                for(let i=0; i<dnaSalvo.length; i++) { if(dnaSalvo[i] === dnaAtual[i]) acertos++; }
                let sim = (acertos / dnaSalvo.length) * 100;

                stats.innerText = `Padrão: ${Math.round(sim)}%`;
                barra.style.width = sim + "%";

                if (sim > 65) {
                    status.innerText = "ABRINDO...";
                    window.location.href = linkSalvo;
                } else {
                    alert("Não identificado.");
                }
            } catch (e) { alert("Erro ao acessar servidor."); }
        }
    </script>
</body>
</html>
