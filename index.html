<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VRChat AR - Perspectiva 3D</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        .sbs-container { display: flex; width: 100vw; height: 100vh; perspective: 1000px; }
        .eye { width: 50vw; height: 100vh; position: relative; overflow: hidden; border-right: 1px solid #222; perspective: 600px; }

        video {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.5;
        }

        /* O Container de Perspectiva */
        .viewport-3d {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .avatar-container {
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar { 
            width: 140px; 
            filter: drop-shadow(0 0 20px #00d1ff);
            /* Dá volume ao avatar */
            transform: translateZ(50px); 
        }

        .ground-grid {
            position: absolute;
            width: 300px; height: 300px;
            background-image: linear-gradient(#00d1ff 1px, transparent 1px), linear-gradient(90deg, #00d1ff 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.2;
            transform: rotateX(80deg) translateY(150px);
        }

        #status { position: absolute; top: 10px; left: 10px; z-index: 10; color: #00d1ff; font-family: monospace; font-size: 10px; }
    </style>
</head>
<body>

    <div id="status">PERSPECTIVE ENGINE: ACTIVE</div>

    <div class="sbs-container">
        <!-- OLHO ESQUERDO -->
        <div class="eye">
            <video class="camFeed" autoplay playsinline></video>
            <div class="viewport-3d" id="worldL">
                <div class="avatar-container">
                    <img src="https://dicebear.com" class="avatar">
                    <div class="ground-grid"></div>
                </div>
            </div>
        </div>

        <!-- OLHO DIREITO -->
        <div class="eye">
            <video class="camFeed" autoplay playsinline></video>
            <div class="viewport-3d" id="worldR">
                <div class="avatar-container">
                    <img src="https://dicebear.com" class="avatar">
                    <div class="ground-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="aiCanvas" style="display:none;"></canvas>

    <script>
        const video = document.querySelector('.camFeed');
        const canvas = document.getElementById('aiCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const worlds = [document.getElementById('worldL'), document.getElementById('worldR')];

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.querySelectorAll('.camFeed').forEach(v => v.srcObject = stream);
            render();
        }

        function render() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 40; canvas.height = 30;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                let avgX = 0, avgY = 0, count = 0;
                for (let i = 0; i < frame.data.length; i += 4) {
                    if ((frame.data[i] + frame.data[i+1] + frame.data[i+2])/3 > 160) {
                        avgX += (i/4) % canvas.width;
                        avgY += Math.floor((i/4) / canvas.width);
                        count++;
                    }
                }

                if (count > 0) {
                    // Normaliza as coordenadas de -1 a 1
                    const nx = ((avgX / count) / canvas.width) * 2 - 1;
                    const ny = ((avgY / count) / canvas.height) * 2 - 1;

                    // Cálculos de Perspectiva
                    const moveX = nx * 150;  // Movimento lateral
                    const moveY = ny * 100;  // Movimento vertical
                    const rotY = nx * 25;    // Rotação horizontal (olha para o lado)
                    const rotX = -ny * 15;   // Rotação vertical (inclina para cima/baixo)

                    worlds.forEach(w => {
                        w.style.transform = `translate3d(${moveX}px, ${moveY}px, 0px) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
                    });
                }
            }
            requestAnimationFrame(render);
        }
        window.onload = init;
    </script>
</body>
</html>
